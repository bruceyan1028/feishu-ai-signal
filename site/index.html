     浅色红黑主题 — 所有视觉色集中在此 :root。
     改配色 = 只改这里(刷新即看)。accent 换色由 --ds-accent 派生。
     ============================================================ */
  :root {
    /* 中性表面:全部纯白 */
    --ds-canvas: #ffffff;          /* 页底:纯白 */
    --ds-section: #ffffff;         /* 内容区列底:纯白 */
    --ds-panel-solid: #ffffff;     /* 浅色对比块 */
    --ds-panel: #ffffff;           /* 面板 */
    --ds-card: #ffffff;            /* 卡片底 */

    /* 描边:实心墨线(编辑风,加重以强化分区可读性) */
    --ds-border: rgba(22,19,15,.24);
    --ds-border-2: rgba(22,19,15,.42);
    --ds-hair: rgba(22,19,15,.14);
    --ds-chip: rgba(22,19,15,.05);
    --ds-ink-line: #16130f;        /* 主结构墨线(卡片外框/分区) */

    /* 叠加(替代原白色玻璃叠加) */
    --ds-fill-1: rgba(22,19,15,.04);
    --ds-fill-2: rgba(22,19,15,.02);
    --ds-fill-3: rgba(22,19,15,.06);

    /* 文字 */
    --ds-text: #16130f;            /* 主(近黑) */
    --ds-text-2: #4a453d;
    --ds-text-3: #6f685e;
    --ds-on-dark: #faf7f0;         /* 深色块上的浅字 */

    /* 强调:红 */
    --ds-accent: #c22f2a;
    --ds-accent-soft: color-mix(in srgb, var(--ds-accent) 10%, transparent);
    --ds-accent-border: color-mix(in srgb, var(--ds-accent) 45%, transparent);
    --ds-accent-glow: transparent;                                   /* 浅色去辉光 */
    --ds-accent-faint: color-mix(in srgb, var(--ds-accent) 6%, transparent);
    --ds-accent-bright: var(--ds-accent);                            /* 浅底不提亮 */
    --ds-accent-deep: color-mix(in srgb, var(--ds-accent), black 30%);

    /* 状态 */
    --ds-good: #1f7a45; --ds-good-bg: rgba(31,122,69,.10); --ds-good-border: rgba(31,122,69,.45);
    --ds-warn: #a06600; --ds-warn-bg: rgba(160,102,0,.10); --ds-warn-border: rgba(160,102,0,.45);
    --ds-crit: #c22f2a; --ds-crit-bg: rgba(194,47,42,.08); --ds-crit-border: rgba(194,47,42,.45);

    /* 图表类别色(降饱和适配浅底) */
    --ds-cat-1: #2b6cb0; --ds-cat-2: #1f7a45; --ds-cat-3: #a06600; --ds-cat-4: #5a4fb5;
    --ds-cat-5: #c22f2a; --ds-cat-6: #b23a6a; --ds-cat-7: #bf4a1e; --ds-cat-8: #2f6b2f;

    /* 圆角:直角化 */
    --ds-radius-sm: 0px; --ds-radius: 0px; --ds-radius-lg: 2px; --ds-radius-xl: 2px;

    /* 兼容旧变量名(简报条等) */
    --accent: var(--ds-accent);
    --accent-soft: var(--ds-accent-soft);
    --accent-border: var(--ds-accent-border);
    --accent-deep: var(--ds-accent-deep);
    --accent-bright: var(--ds-accent-bright);
    --accent-faint: var(--ds-accent-faint);
    --accent-glow: var(--ds-accent-glow);
  }
  body { margin: 0; background: var(--ds-canvas); color: var(--ds-text); font-family: "Geist", "PingFang SC", "Microsoft YaHei", sans-serif; }
  a { color: var(--ds-text); text-decoration: none; }
  a:hover { color: var(--accent-bright, #c22f2a); }
  ::selection { background: color-mix(in srgb, var(--ds-accent) 22%, transparent); }
  ::-webkit-scrollbar { width: 11px; height: 11px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(22,19,15,.18); border-radius: 8px; border: 3px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(22,19,15,.2); }
  @keyframes hairline { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  @keyframes floaty { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes popIn { from { opacity: 0; transform: translateY(14px) scale(.985); } to { opacity: 1; transform: translateY(0) scale(1); } }
  @keyframes slideRight { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
  button, input, select, textarea { font-family: inherit; }
  /* --- 信号卡片:可点,悬停做硬阴影位移(编辑/野兽派风) --- */
  .signal-card { cursor: pointer; transition: transform .12s ease, box-shadow .12s ease; }
  .signal-card:hover { transform: translate(-2px, -2px); box-shadow: 6px 6px 0 var(--ds-accent) !important; }
  .signal-card:hover .card-hint { opacity: 1; transform: translateX(0); }
  .card-hint { opacity: 0; transform: translateX(-4px); transition: opacity .2s ease, transform .2s ease; }
  .personal-card { transition: transform .12s ease, box-shadow .12s ease; }
  .personal-card:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ds-accent) !important; }
  /* --- 简报卡片 --- */
  .brief-card { transition: transform .12s ease, box-shadow .12s ease; }
  .brief-card:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 var(--ds-accent) !important; }
  .brief-card .ref:hover { background: var(--ds-accent) !important; color: #fff !important; }
  .brief-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); grid-auto-rows: auto; gap: 16px; }

  .src-row:hover { background: rgba(22,19,15,.03); }
  .src-link:hover { color: var(--accent-bright, #a78bff) !important; border-bottom-color: var(--accent-bright, #a78bff) !important; }
  .del-btn:hover { color: #ff8a8a !important; border-color: rgba(255,120,120,.4) !important; }
  .add-btn:hover { filter: brightness(1.12); }
  .swatch { cursor: pointer; width: 16px; height: 16px; border-radius: 5px; border: 1px solid rgba(22,19,15,.25); padding: 0; }
  .swatch.active { box-shadow: 0 0 0 2px #08080a, 0 0 0 4px rgba(255,255,255,.6); }
  /* --- 顶部主导航(浅色条上,方角卡片按钮) --- */
  .top-item { display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 14px; cursor: pointer; color: var(--ds-text-2); transition: color .15s ease, background .15s ease, border-color .15s ease; border: 1.5px solid var(--ds-ink-line); background: #fff; font-size: 13px; font-weight: 600; font-family: inherit; }
  .top-item:hover { background: var(--ds-accent-faint); color: var(--ds-text); }
  .top-item.active { font-weight: 700; }
  .top-item svg { width: 17px; height: 17px; }
  /* --- 底部 AI 对话条(浅色) --- */
  .bot-input { flex: 1; height: 40px; padding: 0 14px; border: 1.5px solid var(--ds-ink-line); background: #fff; color: var(--ds-text); font-size: 13px; outline: none; }
  .bot-input::placeholder { color: var(--ds-text-3); }
  .bot-input:focus { box-shadow: inset 0 0 0 1px var(--ds-accent); }
  /* --- 简报每条:单行长条 + 深色小标题色块 + 加粗紫色竖条 --- */
  .brief-bullet { position: relative; display: flex; align-items: center; gap: 12px; padding: 8px 16px 8px 10px; min-height: 44px; border: 1px solid rgba(22,19,15,.09); border-radius: 10px; background: linear-gradient(90deg, var(--accent-soft, rgba(108,71,255,.14)) 0, rgba(22,19,15,.045) 180px, rgba(22,19,15,.02) 100%); box-shadow: 0 1px 2px rgba(0,0,0,.3); transition: background .2s ease, box-shadow .2s ease, border-color .2s ease, transform .12s ease; }

  .bl-bar { flex: none; width: 6px; align-self: stretch; min-height: 28px; border-radius: 4px; background: linear-gradient(180deg, var(--accent-bright, #a78bff), var(--accent, #6C47FF)); box-shadow: 0 0 0 1px rgba(0,0,0,.3), 0 3px 12px -1px var(--accent-glow, rgba(108,71,255,.55)); }
  .bl-title { flex: none; font-size: 13px; font-weight: 700; color: #ffffff; background: linear-gradient(180deg, #34343e, #1c1c22); padding: 6px 13px; border-radius: 7px; white-space: nowrap; border: 1px solid rgba(22,19,15,.1); box-shadow: 0 1px 3px rgba(0,0,0,.4), inset 0 1px 0 rgba(22,19,15,.08); }
  .bl-text { flex: 1; min-width: 0; font-size: 13.5px; line-height: 1.5; color: var(--ds-text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bl-refs { flex: none; display: inline-flex; gap: 5px; }

  .brief-bullet:hover .ref { opacity: 1; }
  .brief-bullet .ref:hover { transform: translateY(-1px); box-shadow: 0 3px 10px -3px var(--accent-glow, rgba(108,71,255,.5)); }
  /* --- 详情覆盖层 --- */
  .detail-overlay { position: fixed; inset: 0; z-index: 200; display: flex; align-items: flex-start; justify-content: center; padding: 40px 20px; background: rgba(4,4,6,.72); backdrop-filter: blur(8px); overflow-y: auto; animation: fadeIn .18s ease; }
  .detail-panel { position: relative; width: 100%; max-width: 1040px; margin: auto; border-radius: 20px; background: var(--ds-panel); border: 1px solid rgba(22,19,15,.12); box-shadow: 0 40px 90px -30px rgba(0,0,0,.85); overflow: hidden; animation: popIn .24s cubic-bezier(.2,.7,.3,1); }
  /* --- 详情页标签 --- */
  .dtab { height: 38px; padding: 0 16px; border: 1.5px solid var(--ds-ink-line); background: #fff; color: var(--ds-text-2); font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .dtab.on { background: var(--ds-accent); color: #fff; font-weight: 700; }
  /* --- 正文笔记:高亮 / 下划线 / 悬浮折叠评论 --- */

  .note-ul { border-bottom: 2px solid var(--ds-accent); padding-bottom: 1px; }
  .note-cmt { position: relative; background: var(--ds-accent-faint); border-bottom: 2px dotted var(--ds-accent); cursor: help; }
  .note-cmt .cmt-pop { display: none; position: absolute; left: 0; top: 100%; margin-top: 6px; z-index: 30; width: 260px; padding: 10px 12px; background: #16130f; color: #faf7f0; font-size: 12px; line-height: 1.6; box-shadow: 0 12px 30px -10px rgba(0,0,0,.6); }
  .note-cmt .cmt-pop b { color: var(--ds-accent-bright); }
  .note-cmt:hover .cmt-pop { display: block; }
  .detail-close { position: absolute; top: 16px; right: 16px; z-index: 3; width: 34px; height: 34px; border-radius: 9px; border: 1px solid rgba(22,19,15,.14); background: rgba(22,19,15,.06); color: var(--ds-text-2); font-size: 17px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; }
  .detail-close:hover { background: rgba(22,19,15,.12); }
  .rel-card:hover { border-color: var(--accent-border, rgba(108,71,255,.4)) !important; background: rgba(22,19,15,.05) !important; }
  .fig-tile:hover { transform: translateY(-2px); filter: brightness(1.08); }
  /* --- 辩论气泡 --- */
  .debate-post { animation: slideRight .3s ease both; }
  .send-btn:hover { filter: brightness(1.12); }
  .chip-btn:hover { border-color: var(--accent-border, rgba(194,47,42,.4)) !important; color: var(--ds-text) !important; }
  .cmt-row:hover { background: rgba(22,19,15,.03); }
  .like-btn:hover { border-color: var(--accent-border) !important; color: var(--accent-bright) !important; }
  /* --- 索引跳转:卡片高亮闪动 --- */

  .flash-red { animation: flashred 1.5s ease-in-out; }
</style>

const SPECIAL_CONTENT_TYPES = ['论文','视频','社交媒体帖子','公众号'];
function signalContentType(s){
  const explicit = s.contentType || s.kind || '';
  if(explicit === '社交媒体') return '社交媒体帖子';
  if(SPECIAL_CONTENT_TYPES.includes(explicit)) return explicit;
  const text = `${s.source||''} ${s.url||''}`.toLowerCase();
  if(/mp\.weixin\.qq\.com|weixin\.qq\.com|微信公众号|公众号/.test(text)) return '公众号';
  if(/youtube\.com|youtu\.be|bilibili\.com|vimeo\.com|视频/.test(text) || (s.mediaAssets?.videos||[]).length) return '视频';
  if(/arxiv\.org|openreview\.net|doi\.org|学术论文|\barxiv\b/.test(text)) return '论文';
  if(/x\.com\/|twitter\.com\/|weibo\.com\/|linkedin\.com\/|社交媒体/.test(text)) return '社交媒体帖子';
  return '';
}

function hexToRgb(h){ const m=h.replace('#',''); const n=parseInt(m.length===3?m.split('').map(c=>c+c).join(''):m,16); return [(n>>16)&255,(n>>8)&255,n&255]; }
function scoreColor(v){ if(v>=75) return '#16a34a'; if(v>=55) return '#ca8a04'; return '#dc2626'; }
function scoreBadge(v){ if(v>=75) return {bg:'#f0fdf4',color:'#15803d',border:'#bbf7d0'}; if(v>=55) return {bg:'#fefce8',color:'#a16207',border:'#fde68a'}; return {bg:'#fef2f2',color:'#b91c1c',border:'#fecaca'}; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function zhProse(s){
  return String(s)
    .replace(/,(?=[\u3400-\u9fff“「（])/g, '，')
    .replace(/:(?=[\u3400-\u9fff“「（])/g, '：')
    .replace(/;(?=[\u3400-\u9fff“「（])/g, '；')
    .replace(/([\u3400-\u9fff])\s+(?=[\u3400-\u9fff])/g, '$1')
    .replace(/\s*([，。；：！？、])\s*/g, '$1');
}
function zhProseHtml(html){
  return String(html).split(/(<[^>]+>)/g).map(part=>part.startsWith('<') ? part : zhProse(part)).join('')
    .replace(/([\u3400-\u9fff])\s+(<)/g, '$1$2')
    .replace(/(>)\s+([\u3400-\u9fff])/g, '$1$2');
}

async function sourceApi(path, options = {}){
  const response = await fetch(path, {
    ...options,
    headers: { 'content-type': 'application/json', ...(options.headers || {}) },
  });
  const body = await response.json().catch(()=>({}));
  if(!response.ok) throw new Error(body.error || `请求失败 (${response.status})`);
  return body;
}
async function loadSources(){
  state.sourceSync = { status:'loading', connected:state.sourceSync.connected, busy:false, message:'正在连接飞书多维表格…' };
  render();

    state.sources = Array.isArray(body.sources)
      ? body.sources.map(source=>source.format==='内部文档' ? {...source, type:'内部文档'} : source)
      : [];
    state.sourceMeta = body.meta || state.sourceMeta;
    if(state.sourceMeta.types.length && !state.sourceMeta.types.includes(state.formType)) state.formType=state.sourceMeta.types[0];
    if(state.sourceMeta.formats.length && !state.sourceMeta.formats.includes(state.formFormat)) state.formFormat=state.sourceMeta.formats[0];
    if(state.sourceMeta.priorities.length && !state.sourceMeta.priorities.includes(state.formPriority)) state.formPriority=state.sourceMeta.priorities[Math.min(1,state.sourceMeta.priorities.length-1)];
    state.sourceSync = { status:'connected', connected:true, busy:false, message:`飞书已连接 · ${state.sources.length} 条记录` };
  } catch(error) {

  }
  render();
}
async function loadBrief(){
  const date = new URLSearchParams(location.search).get('date');
  const path = date ? `data/brief-${encodeURIComponent(date)}.json` : 'data/brief-latest.json';
  try {
    const response = await fetch(path, { cache:'no-store' });
    if(!response.ok) throw new Error(`HTTP ${response.status}`);
    const data = await response.json();
    briefMeta = {
      date: data.date || '',
      title: data.title || 'AI Signal 每日情报',
      intro: data.intro || '',
    };
    bullets = Array.isArray(data.bullets) ? data.bullets : [];
    signals = (data.signals || []).map((s, index)=>({
      rank: index + 1,
      recordId: s.recordId,
      impact: Number(s.impact) || 0,
      urgency: s.urgency || '中',
      contentType: s.contentType || s.kind || '',
      kind: s.contentType || s.kind || '文章',
      zhTitle: s.titleCn || s.title || '未命名信号',
      title: s.title || '',
      source: s.source || '未知来源',
      url: s.url || '',
      cat: s.category || '其他',
      date: s.publishedDate || data.date || '',
      summary: s.summary || '',
      why: s.why || '',
      novel: Number(s.novelty) || 0,
      action: Number(s.actionability) || 0,
      tags: Array.isArray(s.tags) ? s.tags : [],
      image: s.imageUrl || '',
      mediaAssets: s.mediaAssets || {images:[], videos:[]},
    }));
    signals.forEach(s => { s.contentType = signalContentType(s); s.kind = s.contentType || '文章'; });
    const seenImages = new Set();
    signals.forEach(s=>{
      const imageKey = s.image.split(/[?#]/)[0].toLowerCase();
      if(!imageKey) return;
      if(seenImages.has(imageKey)) s.image = '';
      else seenImages.add(imageKey);
    });
    const relatedDocs = ['模型选型评测表', '技术决策记录库', 'AI 团队知识库'];
    personal = signals.slice(0,3).map((s,index)=>({
      ref:s.rank,
      match:Math.max(82, 96-index*5),
      title:s.zhTitle,
      reason:s.summary,
      basis:[
        ['内部相关文档', relatedDocs[index]],
        ['追踪动向', `${(s.tags.slice(0,2).join(' / ') || s.cat)} · ${s.source}`],
      ],
    }));
    seedDemoComments(signals);
    render();
  } catch(error) {
    console.warn('真实简报加载失败，保留内置演示数据：', error);
  }
}

// 动向追踪:为自定义实体聚合匹配信号并生成追踪时间线
function buildTimeline(name){
  const low = name.toLowerCase();
  const matched = signals
    .filter(s=>`${s.zhTitle} ${s.title} ${s.tags.join(' ')}`.toLowerCase().includes(low))
    .map(s=>({ date:s.date, title:s.zhTitle, desc:s.summary.slice(0,90)+'…', ref:s.rank }));
  const head = { date:'2026-07-08', title:`已建立「${name}」追踪`, desc:`系统将在每次检索时聚合与「${name}」相关的信号并按时间排列。当前匹配 ${matched.length} 条历史信号。` };

          <div style="flex:1; min-width:0; font-size:20px; font-weight:700; line-height:1.35; letter-spacing:-.01em; color:var(--ds-text); background:${chip}; border-left:3px solid ${c}; padding:6px 10px; white-space:${title.length<=22?'nowrap':'normal'};">${balancedTitle}</div>
          <div style="margin-left:auto; display:grid; grid-template-columns:repeat(2,minmax(0,auto)); gap:${compactRefs?3:5}px; flex:none;">${refsGridHtml}</div>
        </div>
        <div style="font-size: 16px; line-height: 1.75; color: ${UI.text2}; border-top: 1px solid ${cbd}; padding-top: 10px;">${esc(rest)}</div>
      </div>`;
  };
  const featuredHtml = bullets.length ? briefCard(bullets[0], 0, true) : '';
  const promoteLast = bullets.length > 2 && bullets.length % 2 === 0;
  const gridBullets = promoteLast ? bullets.slice(1,-1) : bullets.slice(1);
  const gridHtml = gridBullets.map((b,i)=>briefCard(b, i+1, false)).join('');
  const trailingFeaturedHtml = promoteLast
    ? `<div style="margin-top:16px;">${briefCard(bullets[bullets.length-1], bullets.length-1, true)}</div>`
    : '';

  const personalHtml = personal.map(p => {
    const basisHtml = (p.basis || []).map(([label,value])=>{
      const isDoc = label==='内部相关文档';

      return `<button onclick="event.stopPropagation();${action}" title="${esc(value)}" style="min-width:0; flex:1; display:flex; align-items:center; gap:6px; padding:7px 9px; border:0; border-left:3px solid ${color}; background:${bg}; color:${color}; cursor:pointer;">

    return `

        <span style="margin-left: auto; font-size: 11px; font-weight: 600; color: ${A.accent};">查看详情 →</span>
      </div>
      <div style="flex:1; display:flex; flex-direction:column; padding:15px 14px 0;">
        <div style="flex:1; display:flex; flex-direction:column; justify-content:center; gap:11px; padding:10px 0 14px;">

  const sortFns = {
    impact: (a,b)=>b.impact-a.impact,
    novel: (a,b)=>b.novel-a.novel,
    action: (a,b)=>b.action-a.action,
    date: (a,b)=>b.date.localeCompare(a.date),
  };
  const sortLabels = { impact:'按影响分排序', novel:'按新颖度排序', action:'按可行动排序', date:'按时间排序' };

  const filteredSignals = signals.filter(s => matchesFilter(s, state.filter)).slice().sort(sortFns[state.sortKey]);
  const visible = filteredSignals.slice(0, state.signalLimit);
  const hasMoreSignals = visible.length < filteredSignals.length;

  const filterChipsHtml = filters.map(f => {
    const active = state.filter===f;
    const isEdge = f===EDGE_FILTER;
    return `<button onclick="App.setFilter('${f}')" title="${isEdge?'专题:按「端侧」标签聚合,跨领域':''}" style="height: 30px; padding: 0 14px; border-radius: 15px; border: 1px ${isEdge?'dashed':'solid'} ${active?A.accentBorder:UI.border}; background: ${active?A.accentSoft:'transparent'}; color: ${active?A.accentBright:UI.text2}; font-size: 12.5px; font-weight: ${active?700:550}; cursor: pointer;">${isEdge?'✦ ':''}${f}</button>`;
  }).join('') + `<span aria-hidden="true" style="width: 1px; height: 22px; margin: 0 3px; background: ${UI.border2};"></span>` + FORMAT_FILTERS.map(f => {
    const active = state.filter===f;
    return `<button onclick="App.setFilter('${f}')" title="按内容形式筛选" style="height: 30px; padding: 0 13px; border-radius: 4px; border: 1px solid ${active?'#2f7d4f':'#8bc7a0'}; background: ${active?'#2f7d4f':'#e8f5eb'}; color: ${active?'#fff':'#17613a'}; font-size: 12.5px; font-weight: ${active?700:600}; cursor: pointer;">▦ ${f}</button>`;
  }).join('');

  const sortOpts = [['impact','影响分'],['date','时间']]
    .map(([v,l])=>`<option value="${v}" ${state.sortKey===v?'selected':''}>${l}</option>`).join('');

  const cardsHtml = visible.map((s, idx) => {
    const ib = scoreBadgeD(s.impact);
    const u = urgD[s.urgency];
    const fav = state.favorites.includes(s.rank);
    const sourceUrl = s.url || sourceUrls[s.source] || '#';
    const mono = "'Geist Mono', ui-monospace, Menlo, monospace";
    const num = String(s.rank).padStart(2,'0');
    const tp = topicFor(s);
    const imgUrl = topicImageUrl(s);
    const isEdge = s.tags.includes('端侧');
    const catChip = v => `<span style="font-family: ${mono}; font-weight: 700; color: ${A.accent}; background: ${A.accentFaint}; border: 1px solid ${A.accentBorder}; padding: 3px 9px;">${esc(v)}</span>`;
    const typeChip = s.contentType ? `<span style="font-family: ${mono}; font-weight: 700; color: #17613a; background: #e5f5e9; border: 1px solid #8bc7a0; padding: 3px 9px;">${esc(s.contentType)}</span>` : '';
    const catsHtml = catChip(s.cat) + typeChip + (isEdge ? catChip(EDGE_FILTER) : '');
    const tagsHtml = s.tags.map(t=>`<span style="font-family: ${mono}; font-size: 11px; color: ${UI.text3}; white-space: nowrap;">#${esc(t)}</span>`).join(`<span style="color: var(--ds-hair);">/</span>`);
    return `
    <article id="signal-${s.rank}" class="signal-card" onclick="App.openDetail(${s.rank})" style="position: relative; display: flex; background: ${UI.card}; border: 1.5px solid var(--ds-ink-line); box-shadow: 5px 5px 0 rgba(22,19,15,.07); overflow: hidden; min-height: 214px;">
      <!-- 左:配图,编号角标(=信号号)覆盖左上角 -->
      <div style="flex: none; width: 288px; position: relative; border-right: 1.5px solid var(--ds-ink-line); background: linear-gradient(135deg, ${tp.bg}, #0b0b0e); overflow: hidden;">
        <span style="position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); font-family: ${mono}; font-size: 40px; font-weight: 700; color: ${tp.color}; opacity: .5;">${tp.t}</span>
        <img src="${esc(imgUrl)}" alt="${esc(s.zhTitle)}" loading="lazy" onerror="this.remove()" style="position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover;">
        <span style="position: absolute; top: 0; left: 0; z-index: 2; min-width: 46px; height: 46px; padding: 0 8px; background: ${A.accent}; border-right: 1.5px solid var(--ds-ink-line); border-bottom: 1.5px solid var(--ds-ink-line); display: inline-flex; align-items: center; justify-content: center; font-family: ${mono}; font-size: 18px; font-weight: 700; color: #fff;">${num}</span>
        <span style="position: absolute; bottom: 9px; left: 11px; right: 11px; display: inline-flex; align-items: center; gap: 7px;">
          ${avatarHtml(s.source)}<span style="font-size: 11px; font-weight: 600; color: #fff; text-shadow: 0 1px 3px rgba(0,0,0,.7); overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${esc(s.source)}</span>
        </span>
      </div>
      <!-- 右:内容,底部格子放为何重要 -->
      <div style="flex: 1; min-width: 0; display: flex; flex-direction: column;">
        <div style="display: flex; align-items: center; gap: 8px; padding: 10px 46px 10px 18px; border-bottom: 1px solid var(--ds-ink-line); font-family: ${mono}; font-size: 10.5px; letter-spacing: .04em; color: ${UI.text3}; flex-wrap: wrap;">
          ${catsHtml}
          <span style="display: inline-flex; align-items: center; gap: 6px; overflow: hidden;">${tagsHtml}</span>
          <span style="margin-left: auto; display: inline-flex; gap: 6px; align-items: center;">
            <span>${s.date}</span>
            <span style="font-weight: 700; padding: 3px 8px; background: ${ib.bg}; color: ${ib.color}; border: 1px solid ${ib.border};">影响 ${s.impact}</span>
            <span style="font-weight: 700; padding: 3px 8px; background: ${u.bg}; color: ${u.color}; border: 1px solid ${u.border};">紧迫 ${s.urgency}</span>
          </span>
        </div>
        <button onclick="event.stopPropagation(); App.toggleFav(${s.rank})" title="${fav?'取消收藏':'收藏'}" style="position: absolute; top: 0; right: 0; z-index: 2; width: 36px; height: 36px; border: none; border-left: 1px solid var(--ds-ink-line); border-bottom: 1px solid var(--ds-ink-line); background: ${fav?A.accent:'#fff'}; color: ${fav?'#fff':UI.text3}; font-size: 14px; cursor: pointer; display: inline-flex; align-items: center; justify-content: center;">${fav?'★':'☆'}</button>
        <div style="flex: 1; padding: 15px 18px;">
          <h3 style="margin: 0 0 3px; font-size: 19px; line-height: 1.4; font-weight: 700; letter-spacing: -.01em; color: var(--ds-text);">${esc(s.zhTitle)}</h3>
          <div style="font-family: ${mono}; font-size: 11.5px; line-height: 1.5; color: ${UI.text3}; margin-bottom: 10px;">${esc(s.title)}</div>
          <p style="margin: 0; font-size: 13.5px; line-height: 1.75; color: ${UI.text2}; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">${esc(s.summary)}</p>
        </div>
        <div style="padding: 12px 18px; border-top: 1px solid var(--ds-ink-line); background: ${A.accentSoft}; border-left: 3px solid ${A.accent};">
          <p style="margin: 0; font-size: 12.5px; line-height: 1.65; color: ${UI.text2}; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;"><strong style="color: ${A.accentDeep};">为何重要</strong> · ${esc(s.why)}</p>
        </div>
      </div>
    </article>`;
  }).join('');

  return `
  <main>
    <section style="position: relative;">
      <div style="position: relative; max-width: 1180px; margin: 0 auto; background-color: ${UI.section}; border-left: 1px dashed ${UI.border}; border-right: 1px dashed ${UI.border}; overflow: hidden;">
        <div style="position: relative; padding: 34px 36px 52px;">
          <!-- 报头 -->
          <div style="display: flex; align-items: center; gap: 14px; padding-bottom: 14px; margin-bottom: 26px; border-bottom: 2px solid var(--ds-ink-line);">
            <span style="font-size: 15px; font-weight: 700; color: ${A.accent};">今日情报简报</span>
            <span style="width: 1px; height: 15px; background: ${UI.border2};"></span>
            <span style="font-family: ${mono}; font-size: 13px; color: ${UI.text2};">${esc(briefMeta.date)}</span>
            <span style="margin-left: auto; font-family: ${mono}; font-size: 13px; font-weight: 700; letter-spacing: .08em; color: var(--ds-ink-line);">${signals.length} SIGNALS</span>
          </div>
          <!-- 大标题 -->
          <h1 style="margin: 0 0 12px; font-size: 58px; line-height: 1.02; font-weight: 800; letter-spacing: -.03em; color: var(--ds-text);">${esc(briefMeta.title)}</h1>
          <p style="margin: 0 0 30px; font-size: 20px; line-height: 1.45; font-weight: 500; color: ${UI.text2}; max-width: 880px;">${esc(briefMeta.intro)}</p>
          <!-- 头条卡片 -->
          <div style="margin-bottom: 16px;">${featuredHtml}</div>
          <!-- 要点 2-5 自适应为两列两行,与头条同宽 -->
          <div class="brief-grid">${gridHtml}</div>
          ${trailingFeaturedHtml}
        </div>
      </div>
    </section>

    ${techDivider(A, '02', '与我相关', false)}
    <section style="position: relative;">
      <div style="max-width: 1180px; margin: 0 auto; padding: 22px 0;">
        <div style="position: relative; background: #0a0a0a; background-image: linear-gradient(rgba(255,255,255,.045) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.045) 1px, transparent 1px); background-size: 44px 44px; overflow: hidden; border: 1.5px solid var(--ds-ink-line); box-shadow: 8px 8px 0 rgba(22,19,15,.10);">
          <div style="position: absolute; top: 0; left: 0; right: 0; height: 4px; background: ${A.accent};"></div>
          <span style="position: absolute; bottom: 12px; right: 18px; color: rgba(255,255,255,.2); font-family: 'Geist Mono', monospace; font-size: 13px;">+</span>
          <div style="position: relative; padding: 38px 36px 42px;">
            <div style="display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; flex-wrap: wrap;">
              <h2 style="margin: 0; font-size: 21px; font-weight: 700; letter-spacing: -.01em; color: #faf7f0;">与我相关</h2>
              <span style="font-size: 12px; color: #8f887a;">基于你的关注方向匹配 · RAG 后端选型 / Agent 基础设施 / 推理成本</span>
            </div>
            <div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-top: 24px;">${personalHtml}</div>
          </div>
        </div>
      </div>
    </section>

    ${techDivider(A, '03', '全部信号', false)}
    <section style="position: relative;">
      <div style="position: relative; max-width: 1180px; margin: 0 auto; background-color: ${UI.section}; background-image: radial-gradient(rgba(22,19,15,.055) 1px, transparent 1px), linear-gradient(rgba(22,19,15,.028) 1px, transparent 1px), linear-gradient(90deg, rgba(22,19,15,.028) 1px, transparent 1px); background-size: 22px 22px, 88px 88px, 88px 88px; border-left: 1px dashed ${UI.border}; border-right: 1px dashed ${UI.border}; overflow: hidden;">
        <div style="position: absolute; top: 120px; left: 3%; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(closest-side, ${A.accentFaint}, transparent); pointer-events: none;"></div>
        <div style="position: relative; padding: 44px 36px 72px;">
          <div style="display: flex; align-items: baseline; gap: 12px; margin-bottom: 18px;">
            <h2 style="margin: 0; font-size: 21px; font-weight: 700; letter-spacing: -.01em; color: var(--ds-text);">全部信号</h2>
            <span style="font-size: 12px; color: ${UI.text3};">${sortLabels[state.sortKey]}</span>
          </div>
          <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;">
            ${filterChipsHtml}
            <div style="margin-left: auto; display: flex; align-items: center; gap: 8px;">
              <span style="font-size: 12px; color: ${UI.text3};">排序</span>
              <select onchange="App.setSort(this.value)" style="height: 30px; padding: 0 10px; border-radius: 8px; border: 1px solid ${UI.border}; background: var(--ds-card); color: ${UI.text}; font-size: 12.5px;">${sortOpts}</select>
            </div>
          </div>
          <div style="display: flex; flex-direction: column; gap: 20px;">${cardsHtml}</div>
          ${hasMoreSignals?`<div style="display:flex; justify-content:center; margin-top:28px;">
            <button onclick="App.showMoreSignals()" style="min-width:150px; height:42px; padding:0 24px; border:1.5px solid var(--ds-ink-line); background:var(--ds-card); color:var(--ds-text); box-shadow:3px 3px 0 rgba(22,19,15,.10); font-size:13px; font-weight:700; cursor:pointer;">查看更多 · ${filteredSignals.length-visible.length} 条</button>
          </div>`:''}
          <div style="margin-top: 40px; padding: 16px 18px; border: 1.5px solid var(--ds-ink-line); background: #fff; box-shadow: 4px 4px 0 rgba(22,19,15,.06);">
            <div style="display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px;">
              <span style="font-size: 14px; font-weight: 700; color: var(--ds-text);">报告遗漏的重要信号</span>
              <span style="font-size: 11.5px; color: ${UI.text3};">遗漏反馈直接进入召回复盘 · 已收到 ${state.missing.length} 条</span>
            </div>
            <p style="margin: 0 0 11px; font-size: 12px; color: ${UI.text3};">觉得「这是重要信号但系统没推」?写下来,系统会回溯该主体 / 主题并调整召回。</p>
            <div style="display: flex; gap: 8px;">
              <input id="missInput" placeholder="例如:某公司发布了 X,但今天没看到相关信号…" onkeydown="if(event.key==='Enter'){event.preventDefault();App.reportMissing();}" style="flex: 1; height: 38px; padding: 0 13px; border: 1.5px solid var(--ds-ink-line); background: var(--ds-card); color: ${UI.text}; font-size: 13px; outline: none;" />
              <button class="send-btn" onclick="App.reportMissing()" style="height: 38px; padding: 0 18px; border: 1.5px solid var(--ds-ink-line); background: ${A.accent}; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;">提交</button>
            </div>
            ${state.missing.length?`<div style="margin-top: 12px; display: flex; flex-direction: column; gap: 6px;">${state.missing.slice(0,4).map(m=>`<div style="font-size: 12px; color: ${UI.text2}; border-left: 2px solid ${A.accent}; padding-left: 10px;">${esc(m)}</div>`).join('')}</div>`:''}
          </div>
          <footer style="margin-top: 40px; padding-top: 24px; border-top: 1px dashed ${UI.border}; font-size: 12px; color: ${UI.text3}; text-align: center;">本简报由 AI Signal 自动生成 · 依据「数据源定制」页配置的来源与优先级检索分析</footer>
        </div>
      </div>
    </section>
  </main>`;
}

          <a href="${esc(s.url||sourceUrls[s.source]||'#')}" target="_blank" rel="noopener" style="font-size: 11.5px; font-weight: 600; color: ${UI.text}; padding: 4px 12px; border-radius: 6px; border: 1px solid ${UI.border2}; background: var(--ds-card);">代码 ↗</a>

          <span><strong style="color: ${UI.text2};">发布</strong> · ${s.date}</span>
          <span><strong style="color: ${UI.text2};">领域</strong> · ${esc(s.cat)}</span>
          <span><strong style="color: ${UI.text2};">来源</strong> · ${esc(s.source)}</span>
        </div>
        <div style="padding: 12px 14px; border-left: 3px solid #B31B1B; background: rgba(22,19,15,.03); border-radius: 0 8px 8px 0;">
          <div style="font-size: 11px; font-weight: 700; letter-spacing: .06em; color: ${UI.text3}; margin-bottom: 6px;">ABSTRACT · 摘要</div>
          <p style="margin: 0; font-size: 13px; line-height: 1.8; color: ${UI.text2};">${esc(s.summary)}</p>
        </div>
      </div>

    return `
    <div style="position: relative; height: 300px; border-radius: 12px; overflow: hidden; margin-bottom: 14px; border: 1px solid ${UI.border}; background: linear-gradient(135deg, #241f18, #0d0b08);">
      <div style="position: absolute; inset: 0; background-image: radial-gradient(rgba(255,255,255,.06) 1px, transparent 1px); background-size: 14px 14px;"></div>
      <div style="position: absolute; top: -60px; right: -40px; width: 300px; height: 220px; border-radius: 50%; background: radial-gradient(closest-side, ${A.accentSoft}, transparent);"></div>

// 正文全文(非摘要):由字段展开为完整文章体,内嵌高亮/下划线/悬浮评论
function articleBody(A, s){
  const t0 = s.tags[0]||s.cat, t1 = s.tags[1]||s.tags[0]||'', t2 = s.tags[2]||'';
  const hl = x => `<mark class="note-hl">${x}</mark>`;
  const ul = x => `<span class="note-ul">${x}</span>`;
  const cmt = (x, who, note) => `<span class="note-cmt">${x}<span class="cmt-pop"><b>${esc(who)}</b> · ${esc(note)}</span></span>`;
  const proseStyle = 'font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif; letter-spacing:0; word-spacing:0; text-align:left; text-justify:none; word-break:normal; overflow-wrap:break-word;';
  const P = html => `<p style="margin: 0 0 16px; font-size: 15px; line-height: 2; color: ${UI.text2}; ${proseStyle}">${zhProseHtml(html)}</p>`;
  const lead = `<p style="margin: 0 0 18px; font-size: 16px; line-height: 1.9; font-weight: 600; color: var(--ds-text); ${proseStyle}">${hl(esc(zhProse(s.summary)))}</p>`;
  const images = s.kind==='论文'
    ? (s.mediaAssets?.images || []).filter(item=>item?.url).slice(0,3)
    : [];
  const videos = (s.mediaAssets?.videos || []).filter(item=>item?.embedUrl).slice(0,1);
  const mediaHtml = [
    ...images.map((item,index)=>`<figure style="margin:24px 0; border:1px solid ${UI.border}; background:#fff;"><img src="${esc(item.url)}" alt="${esc(item.alt||s.zhTitle)}" loading="lazy" style="display:block; width:100%; max-height:560px; object-fit:contain;"><figcaption style="padding:9px 12px; font-size:11.5px; color:${UI.text3};">原文${s.kind==='论文'?'图表':'图片'} ${index+1}${item.alt?` · ${esc(item.alt)}`:''}</figcaption></figure>`),
    ...videos.map(item=>`<div style="position:relative; padding-top:56.25%; margin:24px 0; background:#000;"><iframe src="${esc(item.embedUrl)}" title="${esc(s.zhTitle)}" allow="accelerometer; autoplay; encrypted-media; picture-in-picture" allowfullscreen style="position:absolute; inset:0; width:100%; height:100%; border:0;"></iframe></div>`),
  ].join('');
  // 完整报道体(叙事为主):导语 + 多段正文,内嵌划线与批注
  const paras = [
    lead,
    P(`${esc(s.date)},${esc(s.source)} 就此发布了完整内容。文章开篇便点明,这次围绕 <strong>「${esc(t0)}」</strong> 的进展并非一次例行更新——它给出了此前很少被公开披露的细节,包括具体的实现路径、可复现的配置,以及一组覆盖不同使用场景的数据。对长期跟踪该方向的读者而言,这些细节的价值,往往高于结论本身。`),
    P(`按文中的描述,团队首先解释了他们要解决的核心问题。过去,${esc(t0)} 在真实生产环境里的表现,常常与实验室数据存在不小的落差:纸面上的提升,一旦放到高并发、长上下文或成本敏感的场景中,就会被各种工程约束稀释。为此,他们没有停留在"跑分更高"的叙述上,而是把${cmt('每一项改进都对应到一个可测量的工程指标','平台架构组·李晨','这正是我们评估时最看重的:能不能落到我们自己的指标体系里。')}上,并公开了完整的测量方法。`),
    P(`具体到做法,文章分几个层面展开。在方法层面,团队描述了${esc(t1||t0)}相关的关键设计,并强调这些设计"不是为了刷榜,而是为了在给定预算下把系统跑稳"。在数据层面,他们给出了不同负载形态下的对照结果,并坦率指出了各自的适用边界——${ul('哪些场景收益明显,哪些场景提升有限,都写得相当清楚')}。在工程层面,配套的参考实现与部署脚本同步开放,复现门槛因此大幅下降。`),
    P(`值得注意的是,文中对"成本"着墨很多。作者写道,当同等能力的单位成本持续下探,决策的重心就会从"能不能做到"转向"用什么代价做到";${hl('单位经济学的变化,往往比单点能力的提升更直接地改变一个团队的技术选择')}。这一判断,与本期其它几条信号所指向的趋势相互印证。`),
    P(`不过,${esc(s.source)} 也没有回避局限。文章在结尾提醒,官方给出的数据是在特定设定下取得的,${ul('与具体业务分布之间仍可能存在差距')};在做出替换或大规模采用的决定前,最稳妥的做法仍然是在自有评测集上跑一次回归。对于${s.tags.includes('端侧')?'端侧场景,还需要额外验证功耗与长时发热等工程指标':'对时延与稳定性敏感的场景,还应关注 p95 表现与回退方案'}。`),
    P(`从更长的时间线看,${esc(s.cat)} 领域近一个季度的竞争焦点,正在从"谁的能力更强"转向"谁能更便宜、更可靠、更合规地把它跑进生产"。${t2?`围绕 ${esc(t2)} 的讨论、`:''}配套工具链的成熟,以及第三方复现的跟进(详见「事件聚合」),共同说明这一方向已经从概念走向了工程。接下来值得持续跟踪的,是独立复现能否支持官方数据、定价与供给在放量后的走向,以及它对现有工作负载的实际迁移收益。`),
  ];
  if(mediaHtml) paras.splice(3,0,mediaHtml);
  return paras.join('');
}

// 我的笔记:仿微信读书,按钮触发弹出,只显示我写的文字内容
function myNotesPopup(A, s){
  const notes = [
    '核心结论记一下:单位经济学的变化,比单点能力提升更直接地影响我们的技术选择。',
    '这段的成本模型要拿去和我们本季度的推理预算对一下,看能压到什么水平。',
    '官方基准 ≠ 我们的业务分布,切换前一定先在自有评测集回归。',
    '端侧路线可行的话,记得额外验证功耗与长时发热,别只看 token/s。',
  ];
  const rows = notes.map((t,i)=>`
    <div style="padding: 13px 15px; background: #fff; border: 1.5px solid var(--ds-ink-line); box-shadow: 3px 3px 0 rgba(22,19,15,.06); margin-bottom: 12px;">
      <div style="font-size: 13.5px; line-height: 1.75; color: var(--ds-text);">${esc(t)}</div>
      <div style="margin-top: 8px; font-size: 10.5px; color: ${UI.text3}; font-family: 'Geist Mono', monospace;">想法 · #${i+1}</div>
    </div>`).join('');
  return `
  <div onclick="App.toggleNotes()" style="position: fixed; inset: 0; z-index: 210; background: transparent; display: flex; align-items: flex-start; justify-content: flex-end; padding: 76px 16px 16px;">
    <aside onclick="event.stopPropagation()" style="width: 380px; max-width: 90vw; max-height: calc(100vh - 100px); background: var(--ds-section); border: 1.5px solid var(--ds-ink-line); box-shadow: 6px 6px 0 rgba(22,19,15,.14); display: flex; flex-direction: column; overflow: hidden; animation: slideRight .18s ease;">
      <div style="flex: none; display: flex; align-items: center; gap: 8px; padding: 14px 16px; border-bottom: 1.5px solid var(--ds-ink-line);">
        <span style="color: ${A.accent}; font-size: 15px;">✎</span>
        <span style="font-size: 15px; font-weight: 700; color: var(--ds-text);">我的笔记</span>
        <button onclick="App.toggleNotes()" title="关闭" style="margin-left: auto; width: 28px; height: 28px; border: 1px solid var(--ds-ink-line); background: #fff; color: ${UI.text2}; cursor: pointer; font-size: 15px;">×</button>
      </div>
      <div style="flex: 1 1 auto; min-height: 0; overflow-y: auto; padding: 14px 16px;">
        <!-- 书目卡:标题 + 进度 + 笔记数 -->
        <div style="margin-bottom: 12px; padding: 14px 15px; background: #fff; border: 1.5px solid var(--ds-ink-line); box-shadow: 3px 3px 0 rgba(22,19,15,.07);">
          <div style="font-size: 14px; font-weight: 700; line-height: 1.5; color: var(--ds-text);">${esc(s.zhTitle)}</div>
          <div style="margin-top: 8px; display: flex; gap: 14px; font-size: 11.5px; color: ${UI.text3}; font-family: 'Geist Mono', monospace;">
            <span>➜ 已读到 ${40 + (s.rank % 40)}%</span><span>共 ${notes.length} 条笔记</span>
          </div>
        </div>
        <div style="font-size: 11px; color: ${UI.text3}; margin-bottom: 10px;">你在这条信号里记录的想法(划线 / 高亮只在正文中体现)</div>
        ${rows}
        <button style="width: 100%; height: 40px; margin-top: 4px; border: 1.5px solid var(--ds-ink-line); background: ${A.accent}; color: #fff; font-size: 13px; font-weight: 700; cursor: pointer;">＋ 写想法</button>
      </div>
    </aside>
  </div>`;
}


function detailHtml(A){
  const s = signals.find(x=>x.rank===state.detailRank);
  if(!s) return '';
  const ib = scoreBadgeD(s.impact); const u = urgD[s.urgency];
  const sourceUrl = s.url || sourceUrls[s.source] || '#';
  const km = KIND_META[s.kind || '文章'];
  const points = s.tags.map(t=>`<span style="font-size: 12px; color: ${A.accentBright}; background: ${A.accentSoft}; border: 1px solid ${A.accentBorder}; padding: 4px 11px; border-radius: 999px;">#${esc(t)}</span>`).join('');
  const related = signals.filter(x=>x.cat===s.cat && x.rank!==s.rank).slice(0,3);
  const relatedHtml = related.map(r=>`
    <div class="rel-card" onclick="App.openDetail(${r.rank})" style="cursor: pointer; display: flex; gap: 11px; align-items: flex-start; padding: 13px; border-radius: 11px; border: 1px solid ${UI.border}; background: rgba(22,19,15,.02); transition: border-color .15s, background .15s;">
      ${avatarHtml(r.source)}
      <div style="min-width: 0;">
        <div style="font-size: 13px; font-weight: 600; color: ${UI.text}; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${esc(r.zhTitle)}</div>
        <div style="margin-top: 4px; font-size: 11px; color: ${UI.text3}; font-family: 'Geist Mono', monospace;">#${r.rank} · 影响 ${r.impact} · ${r.date}</div>
      </div>
    </div>`).join('');

  const tabs = [
    { key:'正文', label:'正文全文' },
    { key:'事件聚合', label:'事件聚合' },
    { key:'讨论', label:'讨论 · 反馈' },
  ];
  const tab = state.detailTab || '正文';
  const tabNav = tabs.map(t=>`<button class="dtab${tab===t.key?' on':''}" onclick="event.stopPropagation(); App.setDetailTab('${t.key}')">${t.label}</button>`).join('');

  let bodyHtml = '';
  if(tab==='正文'){
    bodyHtml = `
      <div style="max-width: 760px; margin: 0 auto;">
        ${detailMediaHtml(A, s)}
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;">
          <span style="width: 22px; height: 22px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; background: ${A.accentSoft}; border: 1px solid ${A.accentBorder}; color: ${A.accentBright}; font-size: 12px;">✦</span>
          <span style="font-size: 13px; font-weight: 700; color: ${UI.text};">正文全文</span>
        </div>
        <!-- 选中操作条(仿微信读书) -->
        <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 14px; font-size: 11.5px; color: ${UI.text3}; flex-wrap: wrap;">
          <span>选中文字可:</span>
          ${['复制','划线','写想法','AI 问书'].map(x=>`<span style="display:inline-flex; align-items:center; gap:4px; padding:3px 9px; border:1px solid ${UI.border}; background:#fff; color:${UI.text2}; font-weight:600;">${x}</span>`).join('')}
        </div>
        ${articleBody(A, s)}
        <div style="display: flex; flex-wrap: wrap; gap: 7px; margin: 20px 0 4px;">${points}</div>
        ${analysisHtml(A, s)}
      </div>`;
  } else if(tab==='事件聚合'){
    bodyHtml = eventSourcesHtml(A, s);
  } else {
    bodyHtml = `${feedbackHtml(A, s)}${detailCommentsHtml(A, s)}`;
  }

  return `
  <div class="detail-overlay" onclick="App.closeDetail()">
    <div class="detail-panel" onclick="event.stopPropagation()">
      <button class="detail-close" onclick="App.closeDetail()" title="关闭 (Esc)">×</button>
      <div style="position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, transparent, ${A.accent}, transparent);"></div>
      <div style="position: relative; padding: 30px 32px 0;">
        <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 14px;">
          <span style="font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; background: rgba(22,19,15,.06); color: ${UI.text2}; border: 1px solid ${UI.border2};">${km.icon} ${km.label}</span>
          <span style="font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; background: ${A.accentSoft}; color: ${A.accentBright}; border: 1px solid ${A.accentBorder};">${esc(s.cat)}</span>
          ${s.tags.includes('端侧')?`<span style="font-size: 11px; font-weight: 700; padding: 4px 10px; border-radius: 6px; background: ${A.accentSoft}; color: ${A.accentBright}; border: 1px solid ${A.accentBorder};">端侧模型</span>`:''}
          <span style="font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 6px; background: ${ib.bg}; color: ${ib.color}; border: 1px solid ${ib.border};">影响 ${s.impact}</span>
          <span style="font-size: 11px; font-weight: 700; padding: 4px 9px; border-radius: 6px; background: ${u.bg}; color: ${u.color}; border: 1px solid ${u.border};">紧迫 ${s.urgency}</span>
          <span style="font-size: 11px; color: ${UI.text3}; font-family: 'Geist Mono', monospace;">#${s.rank}</span>
        </div>
        <h1 style="margin: 0 0 6px; font-size: 26px; line-height: 1.35; font-weight: 700; letter-spacing: -.015em; color: var(--ds-text);">${esc(s.zhTitle)}</h1>
        <div style="font-size: 13px; color: ${UI.text3}; margin-bottom: 16px;">${esc(s.title)}</div>
        <div style="display: flex; align-items: center; gap: 10px; flex-wrap: wrap; padding-bottom: 16px; border-bottom: 1px solid ${UI.border};">
          ${avatarHtml(s.source)}
          <a class="src-link" href="${esc(sourceUrl)}" target="_blank" rel="noopener" style="font-size: 13px; font-weight: 600; color: ${UI.text}; border-bottom: 1px dashed rgba(22,19,15,.28);">${esc(s.source)} ↗</a>
          <span style="color: ${UI.text3};">·</span>
          <span style="font-size: 12px; color: ${UI.text3}; font-family: 'Geist Mono', monospace;">${s.date}</span>
        </div>
        <div style="position: sticky; top: 0; z-index: 6; display: flex; align-items: center; gap: 8px; padding: 14px 0 12px; background: var(--ds-panel); flex-wrap: wrap;">
          ${tabNav}
          ${tab==='正文' ? `<button onclick="event.stopPropagation(); App.toggleDialogue()" title="与 AI 的对话记录" style="margin-left: auto; display: inline-flex; align-items: center; gap: 6px; height: 38px; padding: 0 15px; border: 1.5px solid var(--ds-ink-line); background: ${state.dialogueOpen?A.accent:'#fff'}; color: ${state.dialogueOpen?'#fff':UI.text}; font-size: 13px; font-weight: 700; cursor: pointer;">✦ 对话记录 <span style="font-family:'Geist Mono',monospace; font-size:11px; opacity:.8;">${(state.detailQA[s.rank]||[]).length||2}</span></button>` : ''}
          <button onclick="event.stopPropagation(); App.toggleNotes()" title="我的笔记" style="${tab==='正文'?'':'margin-left: auto;'} display: inline-flex; align-items: center; gap: 6px; height: 38px; padding: 0 15px; border: 1.5px solid var(--ds-ink-line); background: ${state.notesOpen?A.accent:'#fff'}; color: ${state.notesOpen?'#fff':UI.text}; font-size: 13px; font-weight: 700; cursor: pointer;">✎ 我的笔记 <span style="font-family:'Geist Mono',monospace; font-size:11px; opacity:.8;">4</span></button>
        </div>
      </div>
      <div style="position: relative; padding: 4px 32px 12px;">
        ${bodyHtml}
      </div>
      <div style="position: sticky; bottom: 0; z-index: 5; padding: 12px 24px 16px; background: linear-gradient(180deg, transparent, var(--ds-panel) 36%);">
        <div style="display: flex; gap: 8px; align-items: center; padding: 8px; background: #fff; border: 1.5px solid var(--ds-ink-line); box-shadow: 4px 4px 0 rgba(22,19,15,.09);">
          <span style="flex: none; width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center; background: var(--ds-ink-line); color: #fff; font-size: 13px;">✦</span>
          <input id="detailAsk" style="flex: 1; height: 36px; padding: 0 12px; border: 1.5px solid var(--ds-ink-line); background: #fff; color: var(--ds-text); font-size: 13px; outline: none;" placeholder="就这篇${km.label}向 AI 提问(回答记入左侧「对话记录」)…" onkeydown="if(event.key==='Enter'){event.preventDefault();App.askDetail(${s.rank});}" />
          <button class="send-btn" onclick="App.askDetail(${s.rank})" style="height: 36px; padding: 0 16px; border: 1.5px solid var(--ds-ink-line); background: ${A.accent}; color: #fff; font-size: 12.5px; font-weight: 700; cursor: pointer;">提问</button>
        </div>
      </div>
      ${state.notesOpen ? myNotesPopup(A, s) : ''}
      ${state.dialogueOpen ? dialoguePopup(A, s) : ''}
    </div>
  </div>`;
}

function sourcesHtml(A){
  const onCount = state.sources.filter(s=>s.on).length;
  const perDaySum = state.sources.reduce((a,x)=>a+(x.on?x.perDay:0),0);
  const avgPer = (perDaySum/(onCount||1)).toFixed(1);
  const sync = state.sourceSync;
  const syncColor = sync.status==='connected' ? 'var(--ds-good)' : sync.status==='error' ? 'var(--ds-crit)' : sync.status==='loading' ? 'var(--ds-warn)' : UI.text3;
  const sourceTypes = state.sourceMeta.types.length ? state.sourceMeta.types : TYPE_ORDER;
  const typeOrder = state.sources.some(source=>source.type==='内部文档') && !sourceTypes.includes('内部文档')
    ? [...sourceTypes, '内部文档']
    : sourceTypes;
  const formatOrder = state.sourceMeta.formats.length ? state.sourceMeta.formats : FORMAT_ORDER;
  const priorityOrder = state.sourceMeta.priorities.length ? state.sourceMeta.priorities : ['高','中','低'];
  const supportsOn = state.sourceMeta.writable.includes('on') || !sync.connected;
  const supportsEdge = state.sourceMeta.writable.includes('edge') || !sync.connected;
  const sourceTabs = sync.connected
    ? [{label:'全部',match:null}, ...typeOrder.map(type=>({label:type,match:[type]}))]
    : srcTabDefs;
  const [formIdLabel, formIdPlaceholder] = idLabels[state.formFormat] || idLabels['网站'];

  const typeOpts = typeOrder.map(v=>`<option value="${v}" ${state.formType===v?'selected':''}>${v}</option>`).join('');
  const formatOpts = formatOrder.map(v=>`<option value="${v}" ${state.formFormat===v?'selected':''}>${v}</option>`).join('');
  const prioOpts = priorityOrder.map(v=>`<option value="${v}" ${state.formPriority===v?'selected':''}>${v}</option>`).join('');

  // ---------- AI 偏好对话窗口 ----------
  const chatMsgs = state.chat.map(m => m.role==='ai'
    ? `<div style="display: flex; gap: 9px; align-items: flex-start;">
         <span style="flex: none; width: 26px; height: 26px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; background: ${A.accentSoft}; border: 1px solid ${A.accentBorder}; color: ${A.accentBright}; font-size: 12px;">✦</span>
         <div style="max-width: 84%; padding: 10px 13px; border-radius: 12px 12px 12px 4px; background: rgba(22,19,15,.05); border: 1px solid ${UI.border}; font-size: 13px; line-height: 1.65; color: ${UI.text};">${esc(m.text)}</div>
       </div>`
    : `<div style="display: flex; gap: 9px; align-items: flex-start; flex-direction: row-reverse;">
         <span style="flex: none; width: 26px; height: 26px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; background: ${A.accent}; color: #ffffff; font-size: 11px; font-weight: 700;">你</span>
         <div style="max-width: 84%; padding: 10px 13px; border-radius: 12px 12px 4px 12px; background: ${A.accentSoft}; border: 1px solid ${A.accentBorder}; font-size: 13px; line-height: 1.65; color: ${UI.text};">${esc(m.text)}</div>
       </div>`
  ).join('');

  const chatPanel = `
    <div style="display: flex; flex-direction: column; border-radius: 14px; background: ${UI.panel}; border: 1px solid ${UI.border}; overflow: hidden; min-height: 340px;">
      <div style="display: flex; align-items: center; gap: 9px; padding: 15px 18px; border-bottom: 1px solid ${UI.border};">
        <span style="width: 8px; height: 8px; border-radius: 50%; background: ${A.accent}; box-shadow: 0 0 8px ${A.accentGlow};"></span>
        <span style="font-size: 13.5px; font-weight: 700; color: var(--ds-text);">AI 偏好助手</span>
        <span style="font-size: 11px; color: ${UI.text3};">告诉我你的关注方向,我来调权重、荐来源</span>
      </div>
      <div id="chatScroll" style="flex: 1; display: flex; flex-direction: column; gap: 12px; padding: 16px 18px; max-height: 300px; overflow-y: auto;">${chatMsgs}</div>
      <div style="display: flex; gap: 8px; padding: 12px 14px; border-top: 1px solid ${UI.border}; background: rgba(22,19,15,.02);">
        <input id="chatInput" placeholder="例如:多关注推理成本,少推融资新闻…" onkeydown="if(event.key==='Enter'){event.preventDefault();App.sendChat();}" style="flex: 1; height: 38px; padding: 0 13px; border-radius: 9px; border: 1px solid ${UI.border}; background: var(--ds-card); color: ${UI.text}; font-size: 13px; outline: none;" />
        <button class="send-btn" onclick="App.sendChat()" style="height: 38px; padding: 0 18px; border-radius: 9px; border: none; background: ${A.accent}; color: #ffffff; font-size: 13px; font-weight: 700; cursor: pointer;">发送</button>
      </div>
    </div>`;

  // ---------- 数据分析看板 ----------
  const stat = (label,val,sub)=>`<div style="padding: 16px 18px; border-radius: 12px; background: ${UI.card}; border: 1px solid ${UI.border};">
      <div style="font-size: 25px; font-weight: 700; color: var(--ds-text); font-variant-numeric: tabular-nums; line-height: 1;">${val}</div>
      <div style="margin-top: 6px; font-size: 11.5px; color: ${UI.text3};">${label}</div>
      ${sub?`<div style="margin-top: 3px; font-size: 10.5px; color: ${A.accentBright};">${sub}</div>`:''}
    </div>`;
  const statTiles = `<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
      ${stat('来源总数', state.sources.length, '')}
      ${stat('启用中', onCount, `占比 ${Math.round(onCount/(state.sources.length||1)*100)}%`)}
      ${stat('日均条目', perDaySum, '启用来源合计')}
      ${stat('单源日均', avgPer, '条 / 源 · 日')}
    </div>`;

  // 类型分布(甜甜圈, dataviz 类别色)
  const types = typeOrder.map((t,i)=>({ label:t, count: state.sources.filter(x=>x.type===t).length, color: CAT[i%CAT.length] })).filter(d=>d.count>0);
  const typeTotal = types.reduce((a,d)=>a+d.count,0) || 1;
  let acc=0; const stops=[];
  types.forEach(d=>{ const start=acc/typeTotal*360; acc+=d.count; const end=acc/typeTotal*360; stops.push(`${d.color} ${start}deg ${Math.max(start,end-1.5)}deg`); stops.push(`${UI.panelSolid} ${Math.max(start,end-1.5)}deg ${end}deg`); });
  const donut = `
    <div style="display: flex; align-items: center; gap: 18px; flex-wrap: wrap;">
      <div style="position: relative; width: 132px; height: 132px; flex: none;">
        <div style="width: 132px; height: 132px; border-radius: 50%; background: conic-gradient(${stops.join(',')});"></div>
        <div style="position: absolute; inset: 24px; border-radius: 50%; background: ${UI.panelSolid}; display: flex; flex-direction: column; align-items: center; justify-content: center;">
          <span style="font-size: 24px; font-weight: 700; color: var(--ds-text); line-height: 1;">${state.sources.length}</span>
          <span style="font-size: 10.5px; color: ${UI.text3}; margin-top: 2px;">来源</span>
        </div>
      </div>
      <div style="flex: 1; min-width: 130px; display: flex; flex-direction: column; gap: 8px;">
        ${types.map(d=>`<div style="display: flex; align-items: center; gap: 8px;">
          <span style="width: 10px; height: 10px; border-radius: 3px; background: ${d.color}; flex: none;"></span>
          <span style="font-size: 12px; color: ${UI.text2}; flex: 1;">${esc(d.label)}</span>
          <span style="font-size: 12px; color: ${UI.text}; font-weight: 600; font-variant-numeric: tabular-nums;">${d.count}</span>
        </div>`).join('')}
      </div>
    </div>`;

  const barChart = (items,color)=>{ const max=Math.max(1,...items.map(d=>d.count)); return items.map(d=>`
      <div style="display: flex; align-items: center; gap: 10px;">
        <span style="flex: none; width: 54px; font-size: 11.5px; color: ${UI.text2}; text-align: right;">${esc(d.label)}</span>
        <div style="flex: 1; height: 10px; border-radius: 6px; background: rgba(22,19,15,.05); overflow: hidden;">
          <div style="height: 100%; width: ${Math.round(d.count/max*100)}%; ${d.count>0?'min-width: 6px;':''} border-radius: 6px; background: ${color};"></div>
        </div>
        <span style="flex: none; width: 20px; font-size: 11.5px; color: ${UI.text}; font-weight: 600; text-align: right; font-variant-numeric: tabular-nums;">${d.count}</span>
      </div>`).join(''); };
  const fmtItems = formatOrder.map(v=>({ label:v, count: state.sources.filter(x=>x.format===v).length })).filter(d=>d.count>0);
  const prioItems = priorityOrder.map(v=>({ label:v, count: state.sources.filter(x=>x.priority===v).length }));

  const chartCard = (title,sub,body)=>`<div style="padding: 18px 20px; border-radius: 14px; background: ${UI.panel}; border: 1px solid ${UI.border};">
      <div style="font-size: 13px; font-weight: 700; color: var(--ds-text); margin-bottom: 3px;">${title}</div>
      <div style="font-size: 11px; color: ${UI.text3}; margin-bottom: 16px;">${sub}</div>
      ${body}
    </div>`;
  const dashboard = `
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px;">
      ${chartCard('主体类型分布','按来源主体(大厂 / 媒体 / KOL / 论文 / 实验室 / 内部文档)统计', donut)}
      ${chartCard('信息源格式分布','按格式统计:网站文章 / 公众号 / 视频 / 论文 / 内部文档 / 社交媒体', `<div style="display: flex; flex-direction: column; gap: 11px;">${barChart(fmtItems, A.accent)}</div>`)}
      ${chartCard('优先级分布','高 / 中 / 低 各档来源数', `<div style="display: flex; flex-direction: column; gap: 11px;">${barChart(prioItems, '#199e70')}</div>`)}
    </div>`;

  // ---------- 来源表 ----------
  const srcTabsHtml = sourceTabs.map(d => {
    const active = state.srcTab===d.label;
    const count = d.edge ? state.sources.filter(x=>x.edge).length : (d.match ? state.sources.filter(x=>d.match.includes(x.type)).length : state.sources.length);

  const activeDef = sourceTabs.find(d=>d.label===state.srcTab) || sourceTabs[0];

    <div class="src-row" style="display: grid; grid-template-columns: ${grid}; padding: 0 20px; min-height: 58px; align-items: center; border-bottom: 1px solid ${UI.hair}; opacity: ${row.on?'1':'.5'};">
      <div ${supportsOn?`onclick="App.toggleSrc(${rowId})"`:`title="当前飞书表格没有“启用”字段"`} style="width: 36px; height: 20px; border-radius: 10px; background: ${row.on?A.accent:'rgba(22,19,15,.1)'}; border: 1px solid ${row.on?A.accent:'rgba(22,19,15,.16)'}; cursor: ${supportsOn?'pointer':'not-allowed'}; position: relative; transition: background .15s; opacity: ${supportsOn?'1':'.45'};">

      <div style="display: flex; flex-direction: column; gap: 2px; padding-right: 12px;">
        <span style="font-size: 13.5px; font-weight: 600; color: ${UI.text};">${esc(row.name)}</span>

      </div>
      <span style="font-size: 12px; color: ${UI.text2}; display: inline-flex; flex-direction: column; gap: 3px; align-items: flex-start;"><span style="padding: 3px 10px; border-radius: 999px; border: 1px solid ${UI.border}; background: rgba(22,19,15,.03);">${esc(row.format||'网站')}</span><span style="font-size: 10px; color: ${UI.text3};">${esc(row.type)}</span></span>
      ${supportsEdge?`<button onclick="App.toggleEdge(${rowId})" title="${row.edge?'取消端侧标记':'标记为端侧模型来源'}" style="justify-self: start; height: 26px; padding: 0 10px; border-radius: 999px; border: 1px solid ${row.edge?A.accentBorder:UI.border}; background: ${row.edge?A.accentSoft:'transparent'}; color: ${row.edge?A.accentBright:UI.text3}; font-size: 11px; font-weight: 700; cursor: pointer;">${row.edge?'✦ 端侧':'＋端侧'}</button>`:`<span style="font-size:11px;color:${UI.text3};">—</span>`}
      <div style="display: inline-flex; border: 1px solid ${UI.border}; border-radius: 8px; overflow: hidden; width: fit-content; background: rgba(22,19,15,.02);">${prioBtns}</div>
      <span style="font-size: 12px; color: ${UI.text3}; font-family: 'Geist Mono', ui-monospace, Menlo, monospace;">${esc(row.last)}</span>
      <span style="font-size: 12.5px; color: ${UI.text}; font-weight: 600; text-align: right; font-family: 'Geist Mono', ui-monospace, Menlo, monospace;">${row.perDay}</span>

  }).join('');

  const emptyHtml = filtered.length===0 ? `<div style="padding: 36px 20px; text-align: center; font-size: 13px; color: ${UI.text3};">该分类下暂无数据源 · 可在上方「添加数据源」中新增</div>` : '';

  const inputStyle = `height: 36px; padding: 0 12px; border-radius: 8px; border: 1px solid ${UI.border}; background: var(--ds-card); color: ${UI.text}; font-size: 13px; outline: none;`;
  const selStyle = `height: 36px; padding: 0 10px; border-radius: 8px; border: 1px solid ${UI.border}; background: var(--ds-card); color: ${UI.text}; font-size: 13px;`;

  return `
  <main style="position: relative;">
    <div style="position: relative; max-width: 1180px; margin: 0 auto; padding: 40px 36px 72px;">
      <section style="margin-bottom: 28px;">
        <div style="display: flex; align-items: baseline; gap: 12px; margin-bottom: 10px;">
          <h1 style="margin: 0; font-size: 27px; font-weight: 700; letter-spacing: -.015em; color: var(--ds-text);">数据源定制</h1>
          <span style="font-size: 12.5px; color: ${UI.text3};">${state.sources.length} 个来源 · ${onCount} 个启用</span>
          <button onclick="App.reloadSources()" title="${esc(sync.message)}" style="margin-left: auto; display: inline-flex; align-items: center; gap: 7px; height: 30px; padding: 0 10px; border: 1px solid ${UI.border}; background: #fff; color: ${syncColor}; font-size: 11px; font-weight: 700; cursor: pointer;">
            <span style="width: 7px; height: 7px; border-radius: 50%; background: ${syncColor};"></span>${sync.status==='connected'?'飞书已连接':sync.status==='loading'?'连接中':'本地模式'} · 刷新
          </button>
        </div>
        <p style="margin: 0; font-size: 13.5px; line-height: 1.7; color: ${UI.text2}; max-width: 720px;">用对话告诉助手你的偏好,或直接管理来源。可开关来源、按主体分类、标记「端侧模型」维度并调整优先级;优先级同时影响「与我相关」的匹配权重。</p>
      </section>

      <section style="display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; margin-bottom: 16px;">
        ${chatPanel}
        <div style="display: flex; flex-direction: column; gap: 12px;">
          <div style="font-size: 13px; font-weight: 700; color: ${UI.text2}; letter-spacing: .02em;">概览</div>
          ${statTiles}
        </div>
      </section>

      <section style="margin-bottom: 34px;">
        <div style="font-size: 15px; font-weight: 700; color: var(--ds-text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px;"><span style="width: 4px; height: 15px; border-radius: 2px; background: ${A.accent};"></span>数据分析看板</div>

      <section style="margin-bottom: 30px; padding: 22px; border-radius: 12px; background: ${UI.panel}; border: 1px dashed ${UI.border2};">
        <div style="font-size: 13px; font-weight: 700; color: var(--ds-text); margin-bottom: 16px;">添加数据源</div>
        <div style="display: grid; grid-template-columns: 1.1fr 1fr 1fr 1.5fr .7fr auto auto; gap: 12px; align-items: end;">
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="font-size: 11px; color: ${UI.text3};">名称</label>
            <input value="${esc(state.formName)}" oninput="App.setForm('formName', this.value)" placeholder="如:阶跃星辰 / 机器之心" style="${inputStyle}" />
          </div>
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="font-size: 11px; color: ${UI.text3};">信息源类型</label>
            <select onchange="App.setForm('formFormat', this.value)" style="${selStyle}">${formatOpts}</select>
          </div>
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="font-size: 11px; color: ${UI.text3};">主体归属</label>
            <select onchange="App.setForm('formType', this.value)" style="${selStyle}">${typeOpts}</select>
          </div>
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="font-size: 11px; color: ${UI.text3};">${formIdLabel}</label>
            <input value="${esc(state.formUrl)}" oninput="App.setForm('formUrl', this.value)" placeholder="${esc(formIdPlaceholder)}" style="${inputStyle} font-family: 'Geist Mono', ui-monospace, Menlo, monospace;" />
          </div>
          <div style="display: flex; flex-direction: column; gap: 6px;">
            <label style="font-size: 11px; color: ${UI.text3};">优先级</label>
            <select onchange="App.setForm('formPriority', this.value)" style="${selStyle}">${prioOpts}</select>
          </div>
          ${supportsEdge?`<button onclick="App.toggleFormEdge()" title="标记为端侧模型维度" style="height: 36px; padding: 0 14px; border-radius: 8px; border: 1px solid ${state.formEdge?A.accentBorder:UI.border}; background: ${state.formEdge?A.accentSoft:'var(--ds-card)'}; color: ${state.formEdge?A.accentBright:UI.text2}; font-size: 12.5px; font-weight: 700; cursor: pointer;">${state.formEdge?'✦ 端侧':'＋端侧'}</button>`:''}
          <button class="add-btn" onclick="App.add()" ${sync.busy?'disabled':''} title="${esc(sync.message)}" style="height: 36px; padding: 0 22px; border-radius: 8px; border: none; background: ${A.accent}; color: #ffffff; font-size: 13px; font-weight: 700; cursor: ${sync.busy?'wait':'pointer'}; opacity: ${sync.busy?'.6':'1'};">${sync.busy?'写入中…':'+ 添加'}</button>
        </div>
      </section>

      <div style="display: flex; align-items: flex-end; gap: 4px; padding: 0 4px; flex-wrap: wrap;">${srcTabsHtml}</div>

      <section style="border: 1px solid ${UI.border}; border-radius: 12px; overflow: hidden; background: ${UI.panel}; position: relative;">
        <div style="display: grid; grid-template-columns: ${grid}; padding: 0 20px; height: 44px; align-items: center; background: rgba(22,19,15,.03); border-bottom: 1px solid ${UI.border}; font-size: 11px; font-weight: 700; letter-spacing: .06em; color: ${UI.text3};">
          <span>状态</span><span>来源名称</span><span>信息源类型</span><span>端侧</span><span>优先级</span><span>上次检索</span><span style="text-align: right;">条目/日</span><span></span>
        </div>
        ${rowsHtml}
        ${emptyHtml}
      </section>

      <p style="margin: 20px 0 0; font-size: 12px; color: ${UI.text3};">${sync.connected?'分类、获取方式和优先级选项来自飞书多维表格；新增和修改会实时写回。':'当前使用本地演示字段；连接飞书后会自动采用表格中的字段选项。'}</p>
    </div>
  </main>`;
}

// 跳转到某条信号详情的引用角标
function refChip(A,r){
  return `<button onclick="App.openDetail(${r})" title="查看 #${r} 信号" style="display: inline-flex; align-items: center; justify-content: center; min-width: 20px; height: 19px; padding: 0 5px; border: 1px solid ${A.accentBorder}; border-radius: 5px; background: ${A.accentSoft}; color: ${A.accentBright}; font-size: 10.5px; font-weight: 600; font-family: 'Geist Mono', monospace; cursor: pointer;">#${r}</button>`;
}

// 任务视图:AI 周报 / 多模型辩论 / 动向追踪

  let body = '';

  if(state.taskTab==='report'){

        </div>`; }).join('');
      return `<div style="position: sticky; top: 74px; padding: 18px; border-radius: 14px; background: ${UI.panelSolid}; border: 1px solid ${UI.border};">
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 6px;"><span style="width: 4px; height: 14px; border-radius: 2px; background: ${A.accent};"></span><span style="font-size: 13px; font-weight: 700; color: var(--ds-text);">报告待分析区</span><span style="margin-left: auto; font-size: 11px; color: ${UI.text3}; font-family: 'Geist Mono', monospace;">${state.pending.length}</span></div>
        <p style="margin: 0 0 14px; font-size: 11.5px; line-height: 1.6; color: ${UI.text3};">从收藏栏点「＋」加入的新闻会进入这里,下次周报生成时将额外关注。</p>
        <div style="display: flex; flex-direction: column; gap: 9px;">${items || `<div style="font-size: 12px; color: ${UI.text3}; padding: 18px 0; text-align: center; line-height: 1.7;">暂无待分析条目<br>在右侧收藏栏点 ＋ 添加</div>`}</div>
      </div>`;
    };
    const metricsHtml = rep.metrics.map(m=>`<div style="padding: 14px 16px; border-radius: 12px; background: rgba(22,19,15,.03); border: 1px solid ${UI.border};">
        <div style="font-size: 22px; font-weight: 700; color: var(--ds-text); font-variant-numeric: tabular-nums; line-height: 1;">${m.value}</div>
        <div style="margin-top: 5px; font-size: 11px; color: ${UI.text3};">${esc(m.label)}</div>
        <div style="margin-top: 2px; font-size: 10px; color: ${A.accentBright};">${esc(m.sub)}</div>

    const areasHtml = rep.areas.map((a,i)=>`
      <div style="display: flex; gap: 14px; padding: 16px 0; border-top: 1px solid ${UI.hair};">

    const topHtml = rep.topSignals.map(r=>{ const s=signals.find(x=>x.rank===r); if(!s) return ''; return `

        ${state.pending.map(r=>{ const s=signals.find(x=>x.rank===r); return s?`<div style="font-size: 12.5px; color: ${UI.text}; line-height: 1.8;">· ${esc(s.zhTitle)} ${refChip(A,r)}</div>`:''; }).join('')}

  else if(state.taskTab==='debate'){
