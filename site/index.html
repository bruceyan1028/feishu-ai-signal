            <div style="font-size: 13px; line-height: 1.7; color: ${UI.text};">${esc(d.synthesis)}</div>
          </div>
        </div>`;
    }).join('');
    const avatars4 = Object.entries(modelPersonas).map(([n,mp])=>`<span title="${esc(n)}" style="width: 26px; height: 26px; border-radius: 7px; display: inline-flex; align-items: center; justify-content: center; background: ${mp.bg}; border: 1px solid ${mp.border}; color: ${mp.color}; font-weight: 700; font-size: 12px; margin-left: -6px;">${mp.t}</span>`).join('');
    body = `
      <div style="display: flex; flex-direction: column; gap: 16px;">
        <div style="padding: 18px 20px; border-radius: 14px; background: ${UI.panel}; border: 1px solid ${UI.border};">
          <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
            <span style="display: inline-flex; padding-left: 6px;">${avatars4}</span>
            <span style="font-size: 13px; color: ${UI.text2};">Claude · GPT-5 · Gemini · Grok 就你的问题多方辩论并给出综述</span>
          </div>
          <div style="display: flex; gap: 8px;">
            <input id="debateInput" placeholder="抛一个决策问题,让四个模型辩论…如:是否自建向量库?" onkeydown="if(event.key==='Enter'){event.preventDefault();App.askDebate();}" style="flex: 1; height: 40px; padding: 0 14px; border-radius: 10px; border: 1px solid ${UI.border}; background: var(--ds-card); color: ${UI.text}; font-size: 13px; outline: none;" />
            <button class="send-btn" onclick="App.askDebate()" style="height: 40px; padding: 0 20px; border-radius: 10px; border: none; background: ${A.accent}; color: #ffffff; font-size: 13px; font-weight: 700; cursor: pointer;">发起辩论</button>
          </div>
        </div>
        ${debatesHtml}
      </div>`;
  }

  else if(state.taskTab==='meetings'){
    const stStyle = st => st==='已完成'
      ? { color:'var(--ds-good)', bg:'var(--ds-good-bg)', border:'var(--ds-good-border)' }
      : { color:'var(--ds-warn)', bg:'var(--ds-warn-bg)', border:'var(--ds-warn-border)' };
    const cards = state.meetings.map(m=>{
      const st = stStyle(m.status);
      const sumHtml = m.summary.length ? `
        <div style="font-size: 12px; font-weight: 700; color: ${UI.text2}; margin: 14px 0 8px;">纪要要点</div>
        ${m.summary.map(x=>`<div style="display: flex; gap: 8px; align-items: baseline; margin-bottom: 6px;"><span style="flex: none; width: 5px; height: 5px; border-radius: 50%; background: ${A.accent}; position: relative; top: -2px;"></span><span style="font-size: 13px; line-height: 1.65; color: ${UI.text2};">${esc(x)}</span></div>`).join('')}` : '';
      const actHtml = m.actions.length ? `
        <div style="font-size: 12px; font-weight: 700; color: ${UI.text2}; margin: 14px 0 8px;">行动项</div>
        ${m.actions.map(([who,what,due])=>`<div style="display: flex; align-items: center; gap: 9px; padding: 8px 11px; border-radius: 8px; border: 1px solid ${UI.border}; background: rgba(22,19,15,.02); margin-bottom: 6px;">
          <span style="flex: none; width: 22px; height: 22px; border-radius: 50%; display: inline-flex; align-items: center; justify-content: center; background: ${CAT[who.charCodeAt(0)%CAT.length]}; color: #fff; font-size: 11px; font-weight: 700;">${esc(who[0])}</span>
          <span style="font-size: 12.5px; color: ${UI.text};">${esc(what)}</span>
          <span style="margin-left: auto; font-size: 11px; color: ${UI.text3}; font-family: 'Geist Mono', monospace;">${esc(who)} · ${esc(due)}</span>
        </div>`).join('')}` : '';
      const waitingHtml = m.status==='待参会' ? `
        <div style="margin-top: 12px; padding: 11px 13px; border-radius: 9px; border: 1px dashed ${UI.border2}; background: rgba(22,19,15,.02); font-size: 12.5px; line-height: 1.7; color: ${UI.text3};">会议开始时助手将自动入会:先检测是否有官方纪要,若无则调用 ${esc(m.tool)} 实时转录并主动总结,结束后纪要与行动项自动出现在这里。</div>` : '';
      return `
      <div style="padding: 20px 22px; border-radius: 14px; background: ${UI.panel}; border: 1px solid ${UI.border};">
        <div style="display: flex; align-items: center; gap: 9px; flex-wrap: wrap;">
          <span style="font-size: 15px; font-weight: 700; color: var(--ds-text);">${esc(m.title)}</span>
          <span style="font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: ${st.bg}; color: ${st.color}; border: 1px solid ${st.border};">${esc(m.status)}</span>
          <span style="font-size: 10.5px; font-weight: 600; padding: 3px 9px; border-radius: 999px; border: 1px solid ${UI.border}; color: ${UI.text2}; background: rgba(22,19,15,.03);">${esc(m.mode)}</span>
          <span style="font-size: 10.5px; font-weight: 600; padding: 3px 9px; border-radius: 999px; border: 1px solid ${A.accentBorder}; color: ${A.accentBright}; background: ${A.accentSoft};">⚙ ${esc(m.tool)}</span>
          <button onclick="App.removeMeeting(${m.id})" title="移除" style="margin-left: auto; width: 24px; height: 24px; border-radius: 7px; border: 1px solid ${UI.border}; background: transparent; color: ${UI.text3}; cursor: pointer; font-size: 13px;">×</button>
        </div>
        <div style="display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; font-size: 11.5px; color: ${UI.text3}; font-family: 'Geist Mono', monospace;">
          <span>${esc(m.time)}</span><span>${esc(m.link)}</span>${m.mins?`<span>${m.mins} 分钟 · ${m.participants} 人</span>`:''}
        </div>
        ${sumHtml}${actHtml}${waitingHtml}
      </div>`;
    }).join('');
    body = `
      <div style="display: flex; flex-direction: column; gap: 16px;">
        <div style="padding: 18px 20px; border-radius: 14px; background: ${UI.panel}; border: 1px solid ${UI.border};">
          <div style="display: flex; align-items: center; gap: 9px; margin-bottom: 4px;">
            <span style="width: 8px; height: 8px; border-radius: 50%; background: ${A.accent};"></span>
            <span style="font-size: 13.5px; font-weight: 700; color: var(--ds-text);">会议助手</span>
            <span style="font-size: 11px; color: ${UI.text3};">自动参会 · 自动纪要的 Agent</span>
          </div>
          <p style="margin: 0 0 12px; font-size: 12.5px; line-height: 1.7; color: ${UI.text2};">粘贴会议链接即可接入:助手先尝试获取官方纪要;若会议没有官方纪要,则自动参会(调用 Fathom AI / 飞书妙记等工具)实时转录并主动总结,产出纪要要点与行动项。</p>
          <div style="display: flex; gap: 8px;">
            <input id="meetInput" placeholder="粘贴会议链接:飞书 / Zoom / Teams / 腾讯会议…" onkeydown="if(event.key==='Enter'){event.preventDefault();App.addMeeting();}" style="flex: 1; height: 40px; padding: 0 14px; border-radius: 10px; border: 1px solid ${UI.border}; background: var(--ds-card); color: ${UI.text}; font-size: 13px; outline: none; font-family: 'Geist Mono', ui-monospace, Menlo, monospace;" />
            <button class="send-btn" onclick="App.addMeeting()" style="height: 40px; padding: 0 20px; border-radius: 10px; border: none; background: ${A.accent}; color: #ffffff; font-size: 13px; font-weight: 700; cursor: pointer;">＋ 接入会议</button>
          </div>
          <div style="display: flex; gap: 14px; margin-top: 12px; flex-wrap: wrap; font-size: 11px; color: ${UI.text3};">
            <span>① 粘贴链接</span><span>→</span><span>② 检测官方纪要</span><span>→</span><span>③ 无纪要则自动参会转录</span><span>→</span><span>④ 生成纪要与行动项</span>
          </div>
        </div>
        ${cards}
      </div>`;
  }

  else {
    const builtIn = Object.keys(timelineData);
    const custom = Object.keys(state.customTimelines).filter(e=>!builtIn.includes(e));
    const entities = [...builtIn, ...custom];
    const ent = getTimeline(state.timelineEntity).length ? state.timelineEntity : entities[0];
    const events = getTimeline(ent).slice().sort((a,b)=>a.date.localeCompare(b.date));
    const entBtns = entities.map(e=>{ const on=e===ent; const isCustom=!!state.customTimelines[e]; return `<button onclick="App.setTimelineEntity('${e}')" class="chip-btn" style="height: 32px; padding: 0 14px; border-radius: 999px; border: 1px solid ${on?A.accentBorder:UI.border}; background: ${on?A.accentSoft:'transparent'}; color: ${on?A.accentBright:UI.text2}; font-size: 12.5px; font-weight: ${on?700:600}; cursor: pointer;">${isCustom?'✎ ':''}${esc(e)}</button>`; }).join('');
    const tl = events.map((ev,i)=>{ const last=i===events.length-1; return `
      <div style="position: relative; padding: 0 0 ${last?'0':'26px'} 30px;">
        <span style="position: absolute; left: 0; top: 2px; width: 14px; height: 14px; border-radius: 50%; background: ${A.accent}; box-shadow: 0 0 0 4px ${A.accentSoft};"></span>
        ${last?'':`<span style="position: absolute; left: 6px; top: 18px; bottom: 0; width: 2px; background: linear-gradient(${A.accentBorder}, ${UI.border});"></span>`}
        <div style="font-family: 'Geist Mono', monospace; font-size: 11.5px; color: ${A.accentBright}; margin-bottom: 5px;">${ev.date}</div>
        <div style="display: flex; align-items: center; gap: 8px; margin-bottom: 5px; flex-wrap: wrap;">
          <span style="font-size: 14px; font-weight: 700; color: var(--ds-text);">${esc(ev.title)}</span>
          ${ev.ref?refChip(A,ev.ref):''}
        </div>
        <div style="font-size: 12.5px; line-height: 1.65; color: ${UI.text2};">${esc(ev.desc)}</div>
      </div>`; }).join('');
    body = `
      <div style="display: flex; flex-direction: column; gap: 18px;">
        <div style="padding: 16px 18px; border-radius: 14px; background: ${UI.panel}; border: 1px solid ${UI.border};">
          <div style="font-size: 13px; font-weight: 700; color: var(--ds-text); margin-bottom: 4px;">追踪你关心的对象</div>
          <p style="margin: 0 0 12px; font-size: 12px; color: ${UI.text3};">输入机构 / 人物 / 技术,系统会聚合相关信号并按时间维度追踪其动向。</p>
          <div style="display: flex; gap: 8px;">
            <input id="trackInput" placeholder="例如:Anthropic / 黄仁勋 / 投机解码 / 向量数据库…" onkeydown="if(event.key==='Enter'){event.preventDefault();App.trackEntity();}" style="flex: 1; height: 40px; padding: 0 14px; border-radius: 10px; border: 1px solid ${UI.border}; background: ${UI.panelSolid}; color: ${UI.text}; font-size: 13px; outline: none;" />
            <button class="send-btn" onclick="App.trackEntity()" style="height: 40px; padding: 0 20px; border-radius: 10px; border: none; background: ${A.accent}; color: #ffffff; font-size: 13px; font-weight: 700; cursor: pointer;">＋ 追踪</button>
          </div>
        </div>
        <div style="display: flex; align-items: center; gap: 8px; flex-wrap: wrap;">
          <span style="font-size: 12.5px; color: ${UI.text3}; margin-right: 4px;">已追踪</span>${entBtns}
        </div>
        <div style="max-width: 760px; padding: 26px 28px; border-radius: 16px; background: ${UI.panel}; border: 1px solid ${UI.border};">
          <div style="display: flex; align-items: baseline; gap: 10px; margin-bottom: 22px;">
            <h2 style="margin: 0; font-size: 20px; font-weight: 700; color: var(--ds-text);">${esc(ent)}</h2>
            <span style="font-size: 12px; color: ${UI.text3};">时间维度动向 · ${events.length} 条</span>
          </div>
          ${tl || `<div style="font-size: 13px; color: ${UI.text3};">该对象暂无记录 · 新增匹配将自动出现在此时间线</div>`}
        </div>
      </div>`;
  }

  return `
  <main style="position: relative;">
    <div style="max-width: 1180px; margin: 0 auto; padding: 40px 36px 72px;">
      <section style="margin-bottom: 20px;">
        <div style="display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px;">
          <h1 style="margin: 0; font-size: 27px; font-weight: 700; letter-spacing: -.015em; color: var(--ds-text);">任务视图</h1>
          <span style="font-size: 12.5px; color: ${UI.text3};">周报 · 多模型辩论 · 动向追踪 · 会议助手</span>
        </div>
        <p style="margin: 0; font-size: 13.5px; line-height: 1.7; color: ${UI.text2}; max-width: 720px;">由 AI 基于信号库自动生成的周报、可发起的多模型交叉辩论、机构 / 人物 / 技术的动向追踪,以及自动参会记纪要的会议助手。</p>
      </section>
      <div style="display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap;">${tabNav}</div>
      ${body}
    </div>
  </main>`;
}

// 右侧收藏栏(与 AI 历史统一的深色直角视觉,按主题 / 时间归类)
function favPanelHtml(A){
  const n = state.favorites.length;
  const FT = '#f7f3eb', FT2 = '#d3ccbf', FT3 = '#968f83', FB = 'rgba(255,255,255,.18)', FFill = '#fff', FC = '#16130f', FC2 = '#6f685e';
  if(!state.favOpen){
    return `<button onclick="App.toggleFavPanel()" title="展开收藏栏" style="position: fixed; right: 0; top: 50%; transform: translateY(-50%); z-index: 70; display: flex; flex-direction: column; align-items: center; gap: 5px; padding: 12px 8px; border: 1px solid ${FB}; border-right: none; background: #1b1814; color: ${A.accentBright}; cursor: pointer; font-size: 15px;">★<span style="font-size: 11px; color: ${FT2}; font-family: 'Geist Mono', monospace;">${n}</span></button>`;
  }
  const favSignals = state.favorites.map(r=>signals.find(x=>x.rank===r)).filter(Boolean);
  const groups = {};
  favSignals.forEach(s=>{ (groups[s.cat]=groups[s.cat]||[]).push(s); });
  const order = filters.filter(f=>f!=='全部' && f!==EDGE_FILTER);
  const groupHtml = order.filter(c=>groups[c]).map(c=>{
    const arr = groups[c].slice().sort((a,b)=>b.date.localeCompare(a.date));
    const rows = arr.map(s=>{ const inPend=state.pending.includes(s.rank); return `
      <div style="display: flex; gap: 7px; align-items: flex-start; padding: 8px; border: 1px solid ${FB}; background: ${FFill};">
        <button onclick="App.addPending(${s.rank})" title="${inPend?'已在待分析':'加入报告待分析'}" ${inPend?'disabled':''} style="flex: none; width: 22px; height: 22px; border: 1px solid ${inPend?A.accentBorder:'rgba(22,19,15,.2)'}; background: ${inPend?A.accentSoft:'transparent'}; color: ${inPend?A.accent:FC2}; cursor: ${inPend?'default':'pointer'}; font-size: 13px; line-height: 1;">${inPend?'✓':'＋'}</button>
        <div onclick="App.openDetail(${s.rank})" style="flex: 1; min-width: 0; cursor: pointer;">
          <div style="font-size: 12px; font-weight: 600; color: ${FC}; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${esc(s.zhTitle)}</div>
          <div style="margin-top: 2px; font-size: 10px; color: ${FC2}; font-family: 'Geist Mono', monospace;">#${s.rank} · ${s.date}</div>
        </div>
        <button onclick="App.removeFav(${s.rank})" title="移除收藏" style="flex: none; width: 22px; height: 22px; border: 1px solid rgba(22,19,15,.2); background: transparent; color: ${FC2}; cursor: pointer; font-size: 12px; line-height: 1;">×</button>
      </div>`; }).join('');
    return `<div style="margin-bottom: 16px;">
      <div style="display: flex; align-items: center; gap: 6px; margin-bottom: 8px;"><span style="width: 6px; height: 6px; border-radius: 2px; background: ${A.accent};"></span><span style="font-size: 11px; font-weight: 700; letter-spacing: .04em; color: ${FT2};">${esc(c)}</span><span style="font-size: 10px; color: ${FT3}; font-family: 'Geist Mono', monospace;">${arr.length}</span></div>
      <div style="display: flex; flex-direction: column; gap: 7px;">${rows}</div>
    </div>`;
  }).join('');
  return `
  <aside style="position: fixed; right: 12px; top: 70px; bottom: 104px; z-index: 70; width: 288px; display: flex; flex-direction: column; background: #1b1814; border: 1px solid ${FB}; box-shadow: 5px 5px 0 rgba(0,0,0,.22); overflow: hidden;">
    <div style="display: flex; align-items: center; gap: 8px; padding: 14px 16px; border-bottom: 1px solid ${FB};">
      <span style="color: ${A.accentBright}; font-size: 15px;">★</span>
      <span style="font-size: 13.5px; font-weight: 700; color: ${FT};">收藏栏</span>
      <span style="font-size: 11px; color: ${FT3}; font-family: 'Geist Mono', monospace;">${n}</span>
      <button onclick="App.toggleFavPanel()" title="收起" style="margin-left: auto; width: 26px; height: 26px; border: 1px solid ${FB}; background: transparent; color: ${FT2}; cursor: pointer; font-size: 14px;">→</button>
    </div>
    <div style="flex: 1; overflow-y: auto; padding: 14px 16px;">
      ${n ? groupHtml : `<div style="font-size: 12px; color: ${FT3}; line-height: 1.9; text-align: center; padding: 30px 6px;">还没有收藏<br>点信号卡片右上角 ☆<br>收藏后自动按主题 / 时间归类到这里</div>`}
    </div>
    <div style="padding: 10px 16px; border-top: 1px solid ${FB}; font-size: 10.5px; color: ${FT3}; line-height: 1.5;">＋ 加入「报告待分析」· × 移除收藏</div>
  </aside>`;
}

// 左侧:与 AI 交流的历史记录(来自底部 AI 助手对话)
function historyPanelHtml(A){
  const msgs = state.bottomChat;
  const pairs = [];
  for(let i=0;i<msgs.length;i++){ if(msgs[i].role==='user'){ pairs.push({ q: msgs[i].text, a: (msgs[i+1] && msgs[i+1].role==='ai') ? msgs[i+1].text : '' }); } }
  const HT='#f7f3eb', HT2='#d3ccbf', HT3='#968f83', HB='rgba(255,255,255,.18)', HC='#16130f', HC2='#4a453d';
  if(!state.historyOpen){
    return `<button onclick="App.toggleHistory()" title="展开 AI 对话历史" style="position: fixed; left: 0; top: 50%; transform: translateY(-50%); z-index: 70; display: flex; flex-direction: column; align-items: center; gap: 6px; padding: 13px 8px; border: 1px solid ${HB}; border-left: none; background: #1b1814; color: ${A.accentBright}; cursor: pointer; font-size: 14px; box-shadow: 3px 3px 0 rgba(0,0,0,.2);">✦<span style="font-size: 11px; color: ${HT2}; font-family: 'Geist Mono', monospace; writing-mode: vertical-rl;">历史 ${pairs.length}</span></button>`;
  }
  const rows = pairs.slice().reverse().map((p,i)=>`
    <div style="border: 1px solid ${HB}; background: #fff;">
      <div style="display: flex; gap: 7px; align-items: flex-start; padding: 9px 11px;">
        <span style="flex: none; font-family: 'Geist Mono', monospace; font-size: 10px; font-weight: 700; color: #fff; background: ${A.accent}; padding: 2px 6px;">你</span>
        <span style="font-size: 12.5px; font-weight: 600; line-height: 1.5; color: ${HC};">${esc(p.q)}</span>
      </div>
      ${p.a?`<div style="display: flex; gap: 7px; align-items: flex-start; padding: 9px 11px; border-top: 1px solid rgba(22,19,15,.14); background: ${A.accentFaint};">
        <span style="flex: none; font-family: 'Geist Mono', monospace; font-size: 10px; font-weight: 700; color: ${A.accent}; border: 1px solid ${A.accentBorder}; padding: 2px 6px;">✦</span>
        <span style="font-size: 12px; line-height: 1.6; color: ${HC2};">${esc(p.a)}</span>
      </div>`:''}
    </div>`).join('');
  return `
  <aside style="position: fixed; left: 12px; top: 70px; bottom: 158px; z-index: 70; width: 292px; display: flex; flex-direction: column; background: #1b1814; border: 1px solid ${HB}; box-shadow: 5px 5px 0 rgba(0,0,0,.22);">
    <div style="display: flex; align-items: center; gap: 8px; padding: 13px 14px; border-bottom: 1px solid ${HB}; background: #1b1814;">
      <span style="color: ${A.accentBright}; font-size: 14px;">✦</span>
      <span style="font-size: 13.5px; font-weight: 700; color: ${HT};">AI 对话历史</span>
      <span style="font-size: 11px; color: ${HT3}; font-family: 'Geist Mono', monospace;">${pairs.length}</span>
      <button onclick="App.toggleHistory()" title="收起" style="margin-left: auto; width: 26px; height: 26px; border: 1px solid ${HB}; background: transparent; color: ${HT2}; cursor: pointer; font-size: 14px;">←</button>
    </div>
    <div style="flex: 1; overflow-y: auto; padding: 13px 14px; display: flex; flex-direction: column; gap: 10px;">
      ${rows || `<div style="font-size: 12px; color: ${HT3}; line-height: 1.9; text-align: center; padding: 30px 6px;">还没有对话记录<br>在底部「AI 助手」里提问<br>历史会按时间显示在这里</div>`}
    </div>
    <div style="padding: 9px 14px; border-top: 1px solid ${HB}; font-size: 10.5px; color: ${HT3}; line-height: 1.5;">最新对话在最上 · 点底部输入框继续提问</div>
  </aside>`;
}

function render(){
  const A = computeAccents();
  const page = state.page==='brief' ? briefHtml(A) : state.page==='sources' ? sourcesHtml(A) : tasksHtml(A);
  document.getElementById('app').innerHTML = `<div style="position: relative; z-index: 1; min-height: 100vh; background: ${UI.canvas}; padding-bottom: 150px;">${headerHtml(A)}${page}</div>${bottomBarHtml(A)}${favPanelHtml(A)}${historyPanelHtml(A)}`;
  renderDetailLayer();
}

// 详情浮层单独渲染:切换标签 / 开合折叠只重绘这一层,避免整页重排闪烁
function renderDetailLayer(){
  const A = computeAccents();
  document.getElementById('detailLayer').innerHTML = state.detailRank!=null ? detailHtml(A) : '';
}

window.addEventListener('keydown', (e)=>{ if(e.key==='Escape'){ App.closeDetail(); } });
render();
loadBrief();
loadSources();
</script>
</body>
</html>
