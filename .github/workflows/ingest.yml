name: AI Signal Ingest

on:
  schedule:
    # 每 6 小时（UTC）。GitHub Actions 定时可能有几分钟延迟。
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

concurrency:
  group: ingest
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run ingest
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BASE_ID: ${{ secrets.FEISHU_BASE_ID }}
          FEISHU_PARAM_TABLE_ID: ${{ secrets.FEISHU_PARAM_TABLE_ID }}
          FEISHU_ENTRY_TABLE_ID: ${{ secrets.FEISHU_ENTRY_TABLE_ID }}
          DIFY_WEBHOOK_URL: ${{ secrets.DIFY_WEBHOOK_URL }}
        run: python -m src.main
